name: Update Gas Prices Daily

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Download your files
        uses: actions/checkout@v4

      - name: Run the price update script
        run: python scripts/update_prices.py

      - name: Save the updated file back to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily price update $(date +'%Y-%m-%d')"
          git push
